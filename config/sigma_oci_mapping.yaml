# Mapping from Sigma standardized fields to OCI Log Analytics fields
# Format: sigma_field: oci_field
# Multi-word OCL field names must be wrapped in single quotes: "'Field Name'"
#
# This file is the single source of truth for field translation between
# Sigma detection rules and OCI Log Analytics Query Language (OCL).

field_mappings:
  # ─── Common Fields ────────────────────────────────────────────
  user: User
  src_ip: "'Client Host'"
  dst_ip: "'Destination IP'"
  action: Action
  status: Status
  hostname: "'Host Name'"

  # ─── OCI Audit Event Fields ──────────────────────────────────
  event_type: "'Event Type'"
  resource_id: ResourceIdentifier
  resource_name: "'Resource Name'"
  resource_type: "'Resource Type'"
  request_action: "'Request Action Type'"
  compartment_name: "'Compartment Name'"
  compartment_id: "'Compartment OCID'"
  region: "'Region'"
  principal_name: "'Principal Name'"
  auth_type: "'Auth Type'"

  # ─── Network Fields ──────────────────────────────────────────
  src_port: "'Source Port'"
  dst_port: "'Destination Port'"
  protocol: Protocol

  # ─── Payload / Generic ───────────────────────────────────────
  response_payload: "'Original Log Content'"
  process_name: "'Process Name'"
  message: msg

  # ─── Cloud Guard Fields ──────────────────────────────────────
  problem_name: "'Problem Name'"
  risk_level: "'Risk Level'"
  detector_id: "'Detector ID'"

  # ─── Windows Sysmon / Security Fields ────────────────────────
  CommandLine: "'Command Line'"
  Image: "'Process Name'"
  ParentImage: "'Parent Process Name'"
  ParentCommandLine: "'Parent Command Line'"
  Hashes: Hashes
  LogonId: "'Logon ID'"
  TerminalSessionId: "'Terminal Session ID'"
  IntegrityLevel: "'Integrity Level'"
  User: User
  TargetFilename: "'Target Filename'"
  SourceFilename: "'Source Filename'"
  command_line: "'Command Line'"
  OriginalFileName: "'Original File Name'"
  EventID: "'Event ID'"
  Provider: "'Provider'"
  Channel: "'Channel'"

  # ─── Sysmon Network Connection Fields (Event ID 3) ─────────
  SourceImage: "'Source Process'"
  TargetImage: "'Target Process'"
  DestinationHostname: "'Destination Hostname'"
  DestinationIp: "'Destination IP'"
  DestinationPort: "'Destination Port'"
  SourceIp: "'Source IP'"
  SourcePort: "'Source Port'"
  Protocol: Protocol
  Initiated: Initiated

  # ─── Sysmon DNS Query Fields (Event ID 22) ────────────────
  QueryName: "'Query Name'"
  QueryResults: "'Query Results'"

  # ─── Sysmon Named Pipe Fields (Event ID 17/18) ────────────
  PipeName: "'Pipe Name'"

  # ─── MITRE ATT&CK Metadata ────────────────────────────────
  RuleName: RuleName
  TechniqueName: "'Technique Name'"
  TechniqueId: "'Technique ID'"

logsource_mappings:
  # Sigma Category/Product -> ordered OCI Log Source candidates.
  # Converter emits a query filter that matches any listed source.
  #
  # Strategy:
  #   - Prefer native OCI sources where they exist and are data-rich.
  #   - Keep SOC custom sources as fallback for compatibility.
  #   - Linux detections keep SOC-first because there is no single native
  #     equivalent that matches the SOC Linux Syslog pattern coverage.

  # OCI Audit (native)
  oci_audit:
    - OCI Audit Logs

  # Cloud Guard (native-first, SOC fallback)
  oci_cloud_guard:
    - OCI Cloud Guard Problems
    - OCI Cloud Guard Logs
    - SOC Cloud Guard Logs

  # Linux (SOC-first, then native alternatives)
  linux_audit:
    - SOC Linux Syslog Logs
    - Linux Secure Logs
    - Linux Syslog Logs
    - Linux Audit Logs
  linux_auth:
    - SOC Linux Syslog Logs
    - Linux Secure Logs
    - Linux Syslog Logs
    - Linux Audit Logs
  linux_syslog:
    - SOC Linux Syslog Logs
    - Linux Secure Logs
    - Linux Syslog Logs
    - Linux Audit Logs

  # Windows Sysmon/process creation (native-first, SOC fallback)
  windows_process_creation:
    - Windows Sysmon Events
    - Windows Sysmon Operational Logs
    - SOC Windows Sysmon Logs
  windows_sysmon:
    - Windows Sysmon Events
    - Windows Sysmon Operational Logs
    - SOC Windows Sysmon Logs
  windows_event:
    - Windows Sysmon Events
    - Windows Sysmon Operational Logs
    - SOC Windows Sysmon Logs
  windows_security:
    - Windows Sysmon Events
    - Windows Sysmon Operational Logs
    - SOC Windows Sysmon Logs

  # Sysmon Network Connection (Event ID 3)
  windows_network_connection:
    - Windows Sysmon Events
    - Windows Sysmon Operational Logs
    - SOC Sysmon Network Logs
    - SOC Windows Sysmon Logs

  # Sysmon DNS Query (Event ID 22)
  windows_dns_query:
    - Windows Sysmon Events
    - Windows Sysmon Operational Logs
    - SOC Windows Sysmon Logs

  # Sysmon Named Pipe (Event ID 17/18)
  windows_pipe_created:
    - Windows Sysmon Events
    - Windows Sysmon Operational Logs
    - SOC Windows Sysmon Logs

  # Sysmon File Creation (Event ID 11)
  windows_file_creation:
    - Windows Sysmon Events
    - Windows Sysmon Operational Logs
    - SOC Windows Sysmon Logs
