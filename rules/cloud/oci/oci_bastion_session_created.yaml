title: OCI Bastion Session Created
id: e1f2a3b4-4003-4000-8000-000000000003
status: stable
description: Detects creation of a Bastion session providing SSH or port-forwarding access to private resources. Unusual bastion sessions may indicate lateral movement.
logsource:
  product: oci
  service: audit
detection:
  selection:
    event_type: com.oraclecloud.bastion.createsession
  condition: selection
level: medium
tags:
- attack.lateral_movement
- attack.t1021
- stig.AC-17
falsepositives:
- Routine administrative access to private subnets
- Scheduled maintenance windows
