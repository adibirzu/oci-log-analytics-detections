title: OCI Cloud Shell Session Started
id: d1a2b3c4-1006-4000-8000-000000000006
status: stable
description: Detects OCI Cloud Shell session activation. Cloud Shell provides authenticated CLI access to the tenancy and
  can be used for reconnaissance, data access, or lateral movement.
logsource:
  product: oci
  service: audit
detection:
  selection:
    event_type:
    - com.oraclecloud.cloudshell.startenvironment
    - com.oraclecloud.cloudshell.createenvironment
  condition: selection
level: low
tags:
- attack.execution
- attack.t1059.004
- stig.AU-12
version: 1
falsepositives:
- Authorized administrator troubleshooting sessions
