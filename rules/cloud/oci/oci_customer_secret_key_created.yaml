title: OCI Customer Secret Key Created
id: e1f2a3b4-4007-4000-8000-000000000007
status: stable
description: Detects creation of customer secret keys (S3-compatible access keys)
  for OCI Object Storage. These keys provide direct API access and may be used for
  data exfiltration.
logsource:
  product: oci
  service: audit
detection:
  selection:
    event_type: com.oraclecloud.identitycontrolplane.createcustomersecretkey
  condition: selection
level: high
tags:
- attack.credential_access
- attack.t1098.001
- stig.IA-5
falsepositives:
- Legitimate S3-compatible application configuration
- Migration tools requiring Object Storage access
version: 1
