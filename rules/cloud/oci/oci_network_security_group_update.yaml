title: OCI Network Security Group Updated
id: uuid-8
status: stable
description: Detects updates to Network Security Groups (NSGs).
logsource:
  product: oci
  service: audit
detection:
  selection:
    event_type:
    - com.oraclecloud.virtualnetwork.updatenetworksecuritygroup
    - com.oraclecloud.virtualnetwork.addnetworksecuritygroupsecurityrules
  condition: selection
level: medium
tags:
- attack.defense_evasion
