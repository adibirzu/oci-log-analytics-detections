title: OCI Object Storage Pre-Authenticated Request Created
id: d1a2b3c4-1015-4000-8000-000000000015
status: stable
description: Detects creation of pre-authenticated requests (PARs) for OCI Object Storage. PARs bypass IAM authentication and can be used for data exfiltration via shareable URLs.
logsource:
  product: oci
  service: audit
detection:
  selection:
    event_type: com.oraclecloud.objectstorage.createpreauthenticatedrequest
  condition: selection
level: high
tags:
- attack.exfiltration
- attack.t1567
- stig.AC-3
