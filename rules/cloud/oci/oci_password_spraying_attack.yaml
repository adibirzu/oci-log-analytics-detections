title: OCI Password Spraying Attack
id: a1b2c3d4-6007-4000-8000-000000000007
status: stable
description: 'Detects password spraying by monitoring failed OCI Console login attempts
  across multiple user accounts. Unlike brute force (many attempts against one user),
  password spraying tries a few passwords against many accounts to avoid lockout thresholds.

  '
author: SOC Detection Team
date: 2026/02/11
logsource:
  product: oci
  service: audit
detection:
  selection:
    event_type: com.oraclecloud.consolesignon.login
    status: Failure
  condition: selection | count(user_name) by source_ip > 5
  timeframe: 15m
level: high
tags:
- attack.initial_access
- attack.t1110.003
- attack.credential_access
- stig.IA-2
falsepositives:
- Employees with expired or rotated passwords
- MFA enrollment issues
version: 1
