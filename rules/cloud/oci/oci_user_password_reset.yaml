title: OCI User Password Reset by Admin
id: e1f2a3b4-4002-4000-8000-000000000002
status: stable
description: Detects an administrator resetting another user's console password. This
  could indicate account takeover or unauthorized access provisioning.
logsource:
  product: oci
  service: audit
detection:
  selection:
    event_type:
    - com.oraclecloud.identitycontrolplane.createorupdateuiconsolepassword
    - com.oraclecloud.identitycontrolplane.resetuiconsolepassword
  condition: selection
level: high
tags:
- attack.persistence
- attack.t1098
- stig.IA-5
falsepositives:
- Legitimate password resets by help desk
- New user onboarding
version: 1
