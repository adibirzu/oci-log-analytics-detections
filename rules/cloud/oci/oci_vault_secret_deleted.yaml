title: OCI Vault Secret Deleted
id: e1f2a3b4-4001-4000-8000-000000000001
status: stable
description: Detects deletion of secrets from OCI Vault. Secret deletion can indicate
  an attacker covering tracks or disrupting application functionality.
logsource:
  product: oci
  service: audit
detection:
  selection:
    event_type:
    - com.oraclecloud.vault.schedulesecretdeletion
    - com.oraclecloud.vault.deletesecret
  condition: selection
level: high
tags:
- attack.impact
- attack.t1485
- stig.SC-28
falsepositives:
- Routine secret rotation with scheduled deletion
- Application lifecycle management
version: 1
