title: Suspicious Usage of rmmod
id: 7fe696ec-966a-418d-b9f7-7a09fae0876d
status: experimental
description: Detects execution of rmmod removing kernel modules (potential rootkit
  management).
logsource:
  product: linux
  service: audit
detection:
  selection:
    process_name: rmmod
  suspicious_context:
    command_line|contains:
    - '--force'
    - '-f'
  non_standard_parent:
    parent_process_name|contains:
    - bash
    - sh
    - python
    - perl
  condition: selection and (suspicious_context or non_standard_parent)
level: high
tags:
- attack.execution
- attack.t1204
version: 1
falsepositives:
- Legitimate rmmod usage by system administrators
- Automated system scripts
