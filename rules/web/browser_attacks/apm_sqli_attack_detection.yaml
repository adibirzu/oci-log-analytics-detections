title: "APM: SQL Injection Attack in Request"
id: apm-browser-sqli-001
status: stable
description: >
  Detects SQL injection attack payloads in HTTP URLs and query parameters captured
  by OCI APM instrumentation. Covers UNION-based, boolean-based, time-based blind,
  and error-based injection techniques.
references:
  - https://owasp.org/www-community/attacks/SQL_Injection
  - https://attack.mitre.org/techniques/T1190/
author: SOC Detection Engineering
date: 2026/03/17
logsource:
  product: oci
  service: apm
detection:
  selection_union:
    HTTP_URL|contains:
      - 'UNION SELECT'
      - 'UNION%20SELECT'
      - 'UNION+SELECT'
      - 'union select'
      - 'union%20select'
  selection_boolean:
    HTTP_URL|contains:
      - "' OR 1=1"
      - "' OR '1'='1"
      - '%27%20OR%201%3D1'
      - "' AND 1=1"
      - 'OR+1=1'
  selection_destructive:
    HTTP_URL|contains:
      - 'DROP TABLE'
      - 'DROP%20TABLE'
      - 'DELETE FROM'
      - 'INSERT INTO'
      - 'UPDATE SET'
  selection_blind:
    HTTP_URL|contains:
      - 'WAITFOR DELAY'
      - 'BENCHMARK('
      - 'SLEEP('
      - 'pg_sleep'
  selection_recon:
    HTTP_URL|contains:
      - 'INFORMATION_SCHEMA'
      - 'information_schema'
      - 'sysobjects'
      - 'syscolumns'
      - 'ORDER BY 1'
  condition: selection_union or selection_boolean or selection_destructive or selection_blind or selection_recon
level: critical
tags:
  - attack.initial_access
  - attack.t1190
  - owasp.a03
falsepositives:
  - Legitimate search queries containing SQL keywords
  - DAST scanner activity
version: 1
