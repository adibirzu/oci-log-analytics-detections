title: "BLUELIGHT RAT: Browser Spawning Suspicious Child Process"
id: bl-s0657-t1203-001
status: stable
description: >
  Detects Internet Explorer spawning command interpreters or script hosts.
  After exploiting CVE-2020-1380 or CVE-2021-26411, BLUELIGHT uses iexplore.exe
  to spawn cmd.exe, powershell.exe, or wscript.exe for second-stage payload execution.
references:
  - https://attack.mitre.org/techniques/T1203/
  - https://attack.mitre.org/software/S0657/
author: SOC Detection Engineering
date: 2026/03/17
logsource:
  product: windows
  category: process_creation
  service: sysmon
detection:
  selection:
    EventID: 1
    ParentImage|endswith: '\iexplore.exe'
    Image|endswith:
      - '\cmd.exe'
      - '\powershell.exe'
      - '\wscript.exe'
      - '\mshta.exe'
      - '\cscript.exe'
      - '\rundll32.exe'
  condition: selection
level: high
tags:
  - attack.execution
  - attack.t1203
  - apt.apt37
  - malware.bluelight
falsepositives:
  - Browser helper objects launching legitimate utilities
version: 1
