title: "BLUELIGHT RAT: Browser Credential Memory Access"
id: bl-s0657-t1555-001
status: stable
description: >
  Detects non-browser processes accessing browser process memory with full access rights.
  BLUELIGHT reads browser memory (GrantedAccess 0x1fffff = PROCESS_ALL_ACCESS) to
  extract stored credentials, session tokens, and cookies from Chrome, Edge, Firefox.
references:
  - https://attack.mitre.org/techniques/T1555/003/
  - https://attack.mitre.org/software/S0657/
author: SOC Detection Engineering
date: 2026/03/17
logsource:
  product: windows
  category: process_access
  service: sysmon
detection:
  selection:
    EventID: 10
    TargetImage|endswith:
      - '\chrome.exe'
      - '\msedge.exe'
      - '\iexplore.exe'
      - '\firefox.exe'
    GrantedAccess: '0x1fffff'
  filter_browsers:
    SourceImage|endswith:
      - '\chrome.exe'
      - '\msedge.exe'
      - '\iexplore.exe'
      - '\firefox.exe'
      - '\crashpad_handler.exe'
  condition: selection and not filter_browsers
level: critical
tags:
  - attack.credential_access
  - attack.t1555.003
  - apt.apt37
  - malware.bluelight
falsepositives:
  - Security tools performing process inspection
  - Browser debugging tools
version: 1
