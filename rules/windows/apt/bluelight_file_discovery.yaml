title: "BLUELIGHT RAT: File Discovery from Browser Process"
id: bl-s0657-t1083-001
status: stable
description: >
  Detects recursive directory enumeration spawned by browser or script host processes.
  BLUELIGHT performs file and directory discovery to locate sensitive documents,
  credentials, and system files for later collection and exfiltration.
references:
  - https://attack.mitre.org/techniques/T1083/
  - https://attack.mitre.org/software/S0657/
author: SOC Detection Engineering
date: 2026/03/17
logsource:
  product: windows
  category: process_creation
  service: sysmon
detection:
  selection_parent:
    EventID: 1
    ParentImage|endswith:
      - '\iexplore.exe'
      - '\wscript.exe'
      - '\powershell.exe'
      - '\mshta.exe'
  selection_discovery:
    CommandLine|contains:
      - 'dir /s'
      - 'dir /b'
      - 'tree '
      - 'Get-ChildItem'
      - '-Recurse'
      - 'ls -R'
  condition: selection_parent and selection_discovery
level: medium
tags:
  - attack.discovery
  - attack.t1083
  - apt.apt37
  - malware.bluelight
falsepositives:
  - System administrators using browser-based management tools
version: 1
