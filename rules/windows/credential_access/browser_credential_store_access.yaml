title: Browser Credential Store Access
id: 0e026943-1abb-439d-9ed9-bf288e794c71
status: stable
description: Detects processes accessing browser credential stores (Chrome Login Data,
  Firefox logins.json).
logsource:
  product: windows
  category: process_creation
detection:
  selection:
    CommandLine|contains:
    - Login Data
    - logins.json
    - key3.db
    - key4.db
    - cookies.sqlite
  condition: selection
level: high
tags:
- attack.credential_access
- attack.t1555.003
falsepositives:
- Browser backup utilities
- Forensics tools
version: 1
