title: Credential File Discovery
id: 944a5dda-a51e-4d60-b6a5-1488fab361dc
status: stable
description: Detects searches for files commonly containing credentials such as passwords.txt,
  credentials.xml, or web.config.
logsource:
  product: windows
  category: process_creation
detection:
  selection:
    CommandLine|contains:
    - passwords.txt
    - credentials.xml
    - web.config
    - unattend.xml
    - .pgpass
    - id_rsa
    - .aws\credentials
  condition: selection
level: medium
tags:
- attack.credential_access
- attack.t1552.001
falsepositives:
- Security auditing scripts
- File search by system administrators
version: 1
