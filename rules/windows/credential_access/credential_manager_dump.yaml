title: "Credential Manager: High-Frequency Credential Read"
id: credmgr-t1555-004
status: stable
description: >
  Detects Event 5379 credential read operations at high frequency — indicates
  lazagne, seatbelt, or mimikatz vault::cred dumping stored credentials.
logsource:
  product: windows
  service: security
detection:
  selection:
    EventID: 5379
  condition: selection
  aggregation:
    count_by_account:
      field: SubjectUserName
      threshold: 20
  timeframe: 1h
level: medium
tags:
  - attack.credential_access
  - attack.t1555.004
falsepositives:
  - Credential backup tools
version: 1
