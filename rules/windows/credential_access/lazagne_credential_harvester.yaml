title: LaZagne Credential Harvester
id: a5258e61-171d-4125-9f64-88fef5b67283
status: stable
description: Detects execution of LaZagne, an open-source credential harvesting tool
  that extracts passwords from multiple applications.
logsource:
  product: windows
  category: process_creation
detection:
  selection:
    CommandLine|contains:
    - lazagne
    - LaZagne
  condition: selection
level: critical
tags:
- attack.credential_access
- attack.t1555
falsepositives:
- Authorized penetration testing
version: 1
