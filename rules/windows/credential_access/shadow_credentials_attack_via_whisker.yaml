title: Shadow Credentials Attack via Whisker
id: c976df27-1878-46df-a255-6997eb7da6ee
status: stable
description: Detects Shadow Credentials attacks using Whisker or similar tools that
  modify msDS-KeyCredentialLink attribute.
logsource:
  product: windows
  category: process_creation
detection:
  selection:
    CommandLine|contains:
    - Whisker
    - whisker
    - KeyCredential
    - shadowcred
  condition: selection
level: critical
tags:
- attack.credential_access
- attack.t1556
falsepositives:
- Authorized Active Directory security testing
version: 1
