title: Password Policy Discovery
id: a7138199-23c8-42ee-898b-33552ac629ca
status: stable
description: Detects commands querying password policy settings, often part of pre-brute-force
  recon.
logsource:
  product: windows
  category: process_creation
detection:
  selection:
    CommandLine|contains:
    - net accounts
    - Get-ADDefaultDomainPasswordPolicy
  condition: selection
level: low
tags:
- attack.discovery
- attack.t1201
falsepositives:
- Security compliance checks
version: 1
