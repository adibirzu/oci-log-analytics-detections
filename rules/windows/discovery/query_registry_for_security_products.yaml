title: Query Registry for Security Products
id: 8f3a5796-f848-4b01-9ff6-a9c1a3ae6a57
status: stable
description: Detects registry queries checking for installed security products.
logsource:
  product: windows
  category: process_creation
detection:
  selection:
    Image|endswith: \reg.exe
    CommandLine|contains:
    - AntiVirusProduct
    - FirewallProduct
    - SecurityCenter
  condition: selection
level: medium
tags:
- attack.discovery
- attack.t1518.001
falsepositives:
- Security management tools
version: 1
