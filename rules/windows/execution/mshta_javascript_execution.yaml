title: MSHTA JavaScript Execution
id: 5baffc84-0e51-4e15-bbe9-f03b757bd3ea
status: stable
description: Detects MSHTA executing inline JavaScript or VBScript content.
logsource:
  product: windows
  category: process_creation
detection:
  selection:
    Image|endswith: \mshta.exe
    CommandLine|contains:
    - 'javascript:'
    - 'vbscript:'
  condition: selection
level: high
tags:
- attack.execution
- attack.t1218.005
falsepositives:
- Legacy HTA applications
version: 1
