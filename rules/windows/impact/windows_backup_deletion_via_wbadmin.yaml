title: Windows Backup Deletion via wbadmin
id: 47f72096-be3c-4a41-9f76-8972cd26c824
status: stable
description: Detects deletion of Windows backup catalog using wbadmin, preventing
  backup-based recovery.
logsource:
  product: windows
  category: process_creation
detection:
  selection:
    Image|endswith: \wbadmin.exe
    CommandLine|contains: delete
  condition: selection
level: high
tags:
- attack.impact
- attack.t1490
falsepositives:
- Legitimate backup management
version: 1
