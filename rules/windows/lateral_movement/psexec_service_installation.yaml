title: PsExec Service Installation
id: 73756cad-86bb-4ecd-9eda-0e018645328f
status: stable
description: Detects PsExec creating its service (PSEXESVC) on a remote machine.
logsource:
  product: windows
  category: process_creation
detection:
  selection:
    CommandLine|contains:
    - PSEXESVC
    - psexec
  condition: selection
level: high
tags:
- attack.lateral_movement
- attack.t1021.002
falsepositives:
- Legitimate PsExec usage by IT administrators
version: 1
