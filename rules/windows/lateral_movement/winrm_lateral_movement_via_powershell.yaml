title: WinRM Lateral Movement via PowerShell
id: 54acde38-92ba-4d35-a423-0a1a4d6ae6f8
status: stable
description: Detects WinRM-based lateral movement using PowerShell Invoke-Command
  or Enter-PSSession.
logsource:
  product: windows
  category: process_creation
detection:
  selection:
    CommandLine|contains:
    - Invoke-Command
    - Enter-PSSession
    - -ComputerName
  condition: selection
level: medium
tags:
- attack.lateral_movement
- attack.t1021.006
falsepositives:
- Legitimate remote administration
version: 1
