title: Sysmon Cobalt Strike C2 Network Indicators
id: a1b2c3d4-7001-4000-8000-000000000009
status: stable
description: >
  Detects network connections from processes commonly associated with
  Cobalt Strike beacon activity. Includes default Cobalt Strike
  process injection targets and malleable C2 patterns.
author: SOC Detection Team
date: 2026/02/16
logsource:
  product: windows
  service: sysmon
  category: network_connection
detection:
  sel_beacon_process:
    Image|endswith:
    - \beacon.exe
    - \cobaltstrike.exe
    Initiated: 'true'
  sel_injected_outbound:
    Image|endswith:
    - \rundll32.exe
    - \dllhost.exe
    - \svchost.exe
    - \explorer.exe
    Initiated: 'true'
    DestinationPort:
    - 80
    - 443
    - 8080
    - 8443
    - 50050
  filter_internal:
    DestinationIp|startswith:
    - '10.'
    - '172.16.'
    - '192.168.'
    - '127.'
  condition: (sel_beacon_process or sel_injected_outbound) and not filter_internal
level: critical
tags:
- attack.command_and_control
- attack.t1071.001
- attack.t1095
falsepositives:
- Legitimate DLL host operations
- Windows service communication
