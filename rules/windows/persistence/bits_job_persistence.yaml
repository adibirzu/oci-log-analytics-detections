title: BITS Job Persistence
id: 3fc4f8ba-f80b-4154-b7b9-3fd6734f14c5
status: stable
description: Detects BITS jobs created for persistent execution or file download.
logsource:
  product: windows
  category: process_creation
detection:
  selection:
    Image|endswith: \bitsadmin.exe
    CommandLine|contains:
    - /create
    - /addfile
    - /setnotifycmdline
  condition: selection
level: medium
tags:
- attack.persistence
- attack.t1197
falsepositives:
- Legitimate BITS transfers by WSUS or SCCM
version: 1
