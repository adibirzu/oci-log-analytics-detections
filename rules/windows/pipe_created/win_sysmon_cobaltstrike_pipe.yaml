title: Sysmon Cobalt Strike Named Pipe
id: a1b2c3d4-7002-4000-8000-000000000001
status: stable
description: >
  Detects named pipe creation matching known Cobalt Strike default patterns.
  Cobalt Strike uses named pipes for inter-process communication and
  lateral movement via SMB beacon.
author: SOC Detection Team
date: 2026/02/16
logsource:
  product: windows
  service: sysmon
  category: pipe_created
detection:
  sel_cs_default:
    PipeName|startswith:
    - \MSSE-
    - \postex_
    - \postex_ssh_
    - \status_
    - \msagent_
  sel_cs_named:
    PipeName:
    - \interprocess_
    - \mojo.
    - \chrome.
    - \DserNamePipe
    - \winsock
    - \UIA_PIPE
  condition: sel_cs_default or sel_cs_named
level: critical
tags:
- attack.command_and_control
- attack.t1071
- attack.defense_evasion
- attack.t1055
falsepositives:
- Some legitimate software may use similar pipe naming patterns
