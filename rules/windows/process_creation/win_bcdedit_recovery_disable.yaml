title: Windows Boot Configuration Modified
id: d1a2b3c4-3006-4000-8000-000000000006
status: stable
description: Detects use of bcdedit.exe to disable recovery mode or modify boot configuration, commonly seen in ransomware attacks to prevent system recovery.
logsource:
  product: windows
  service: process_creation
detection:
  selection:
    process_name|endswith: bcdedit.exe
    CommandLine|contains:
    - recoveryenabled no
    - bootstatuspolicy ignoreallfailures
    - safeboot
  condition: selection
level: critical
tags:
- attack.impact
- attack.t1490
