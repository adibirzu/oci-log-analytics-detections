title: Windows Credential Dumping via Procdump
id: 6dh4i536-1234-5678-9abc-3456789c2d13
status: stable
description: Detects credential dumping attempts targeting the LSASS process using procdump or similar tools.
logsource:
  product: windows
  service: process_creation
detection:
  sel1:
    process_name: procdump.exe
    CommandLine|contains: lsass
  sel2:
    CommandLine|contains: lsass.dmp
  condition: sel1 or sel2
level: critical
tags:
- attack.credential_access
- attack.t1003.001
version: 1
falsepositives:
- Authorized penetration testing
- Security tool false positives
