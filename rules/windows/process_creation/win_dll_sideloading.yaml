title: Windows DLL Side-Loading via Suspicious Path
id: d1a2b3c4-3005-4000-8000-000000000005
status: stable
description: Detects execution of legitimate Windows binaries from non-standard paths, indicating potential DLL side-loading attacks where malicious DLLs are loaded alongside trusted executables.
logsource:
  product: windows
  service: process_creation
detection:
  sel_target:
    process_name|endswith:
    - rundll32.exe
    - regsvr32.exe
    - msiexec.exe
  sel_path:
    CommandLine|contains:
    - '\AppData\Local\Temp\'
    - '\Users\Public\'
    - '\ProgramData\'
    - '\Downloads\'
  condition: sel_target and sel_path
level: high
tags:
- attack.defense_evasion
- attack.t1574.002
