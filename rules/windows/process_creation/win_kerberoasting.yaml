title: Windows Kerberoasting Attack
id: f1e2d3c4-5014-4000-8000-000000000014
status: stable
description: Detects Kerberoasting techniques using tools or PowerShell commands that request TGS tickets for service accounts to crack offline.
logsource:
  product: windows
  service: process_creation
detection:
  sel_rubeus:
    CommandLine|contains:
    - Rubeus
    - kerberoast
  sel_invoke:
    CommandLine|contains:
    - Invoke-Kerberoast
    - Get-SPNUsers
    - Request-SPNTicket
  sel_setspn:
    process_name|endswith: setspn.exe
    CommandLine|contains: '-Q */*'
  condition: sel_rubeus or sel_invoke or sel_setspn
level: critical
tags:
- attack.credential_access
- attack.t1558.003
falsepositives:
- Authorized security assessment
- SPN enumeration by service account management tools
