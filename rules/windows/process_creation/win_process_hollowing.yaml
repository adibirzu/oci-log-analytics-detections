title: Windows Process Hollowing Indicators
id: f1e2d3c4-5018-4000-8000-000000000018
status: stable
description: Detects suspicious process creation patterns indicative of process hollowing
  where a legitimate process is spawned in a suspended state and its memory replaced
  with malicious code.
logsource:
  product: windows
  service: process_creation
detection:
  sel_suspended:
    CommandLine|contains:
    - CREATE_SUSPENDED
    - NtUnmapViewOfSection
    - ZwUnmapViewOfSection
    - WriteProcessMemory
    - NtResumeThread
  condition: sel_suspended
level: critical
tags:
- attack.defense_evasion
- attack.t1055.012
falsepositives:
- Debugging and development tools
- Security products inspecting process memory
version: 1
