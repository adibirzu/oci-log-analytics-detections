title: Windows PsExec Remote Execution
id: f1e2d3c4-5012-4000-8000-000000000012
status: stable
description: Detects use of PsExec or similar Sysinternals tools for remote command execution, commonly used for lateral movement in compromised networks.
logsource:
  product: windows
  service: process_creation
detection:
  sel_psexec:
    process_name|endswith:
    - psexec.exe
    - psexec64.exe
    - PsExec.exe
  sel_cmdline:
    CommandLine|contains:
    - psexec
    - '\\\\'
  sel_accepteula:
    CommandLine|contains: -accepteula
  condition: sel_psexec or (sel_cmdline and sel_accepteula)
level: high
tags:
- attack.lateral_movement
- attack.t1021.002
- attack.t1569.002
falsepositives:
- Legitimate IT administration using PsExec
- Software deployment tools
