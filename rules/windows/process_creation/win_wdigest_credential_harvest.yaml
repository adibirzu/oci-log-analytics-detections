title: Windows WDigest Authentication Enabled for Credential Harvesting
id: f1e2d3c4-5019-4000-8000-000000000019
status: stable
description: Detects enabling WDigest authentication via registry modification. When
  enabled, plaintext credentials are stored in LSASS memory, making them available
  for extraction by tools like Mimikatz.
logsource:
  product: windows
  service: process_creation
detection:
  selection:
    process_name|endswith: reg.exe
    CommandLine|contains: UseLogonCredential
  condition: selection
level: high
tags:
- attack.credential_access
- attack.t1003.001
- attack.defense_evasion
falsepositives:
- Legacy application compatibility configurations
version: 1
