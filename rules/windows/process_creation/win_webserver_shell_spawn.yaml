title: Web Server Process Spawning Command Shell
id: a1b2c3d4-8002-4000-8000-000000000001
status: stable
description: |
  Detects a web server or scripting engine process spawning a command shell
  (cmd.exe, powershell.exe, bash) with suspicious command-line arguments
  containing pipe, semicolon, or other command injection characters.
  This indicates successful Remote Code Execution (RCE) via the web application
  (e.g., OS command injection in a FastAPI/Django/Express endpoint).
  Covers MITRE ATT&CK T1059 (Command and Scripting Interpreter).
author: SOC Detection Team
date: 2026/03/01
logsource:
  product: windows
  service: sysmon
  category: process_creation
detection:
  sel_parent_web:
    ParentImage|endswith:
    - \python.exe
    - \pythonw.exe
    - \python3.exe
    - \node.exe
    - \java.exe
    - \javaw.exe
    - \php.exe
    - \php-cgi.exe
    - \ruby.exe
    - \dotnet.exe
    - \httpd.exe
    - \nginx.exe
    - \w3wp.exe
    - \uvicorn.exe
    - \gunicorn
  sel_child_shell:
    Image|endswith:
    - \cmd.exe
    - \powershell.exe
    - \pwsh.exe
    - \bash.exe
    - \sh.exe
    - \wsl.exe
  sel_injection_chars:
    CommandLine|contains:
    - ;
    - '|'
    - '&&'
    - '||'
    - '`'
    - $
    - /c whoami
    - /c id
    - /c cat
    - /c type
    - /c net
    - '-enc '
    - '-EncodedCommand'
  condition: sel_parent_web and sel_child_shell and sel_injection_chars
level: critical
tags:
- attack.execution
- attack.t1059
- attack.t1059.001
- attack.initial_access
- attack.t1190
falsepositives:
- Legitimate deployment scripts run by web frameworks
- CI/CD build processes spawning shells from web hooks
version: 1
